apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: scraper
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: scraper-cluster
        env: production

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    rule_files: []

    scrape_configs:
      - job_name: 'scraper-api'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 15s
        static_configs:
          - targets: ['scraper-api:8080']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

      - job_name: 'scraper-worker'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 15s
        static_configs:
          - targets: ['scraper-worker:8081']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

      - job_name: 'scraper-scheduler'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 15s
        static_configs:
          - targets: ['scraper-scheduler:8082']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

      - job_name: 'results-processor'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 15s
        static_configs:
          - targets: ['results-processor:8083']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

      - job_name: 'kafka'
        metrics_path: '/metrics'
        scrape_interval: 30s
        static_configs:
          - targets: ['kafka:9092']

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']