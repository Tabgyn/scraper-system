apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: scraper
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'scraper-api'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['scraper-api:8080']

      - job_name: 'scraper-worker'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['scraper-worker:8081']

      - job_name: 'scraper-scheduler'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['scraper-scheduler:8082']

      - job_name: 'results-processor'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['results-processor:8083']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: scraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=15d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: scraper
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090