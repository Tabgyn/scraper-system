spring:
  application:
    name: results-processor

  data:
    mongodb:
      uri: mongodb://localhost:27017/scraper
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9093
    consumer:
      group-id: results-processors
      auto-offset-reset: earliest
      enable-auto-commit: false

server:
  port: 8083

scraper:
  s3:
    bucket: scraper-raw
    region: us-east-1
    access-key: minioadmin
    secret-key: minioadmin
    endpoint: http://localhost:9000  # MinIO for local dev

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        scraper.jobs.duration: true
      percentiles:
        scraper.jobs.duration: 0.5, 0.95, 0.99