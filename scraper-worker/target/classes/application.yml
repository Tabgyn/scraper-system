spring:
  application:
    name: scraper-worker

  datasource:
    url: jdbc:postgresql://localhost:5432/scraper
    username: scraper
    password: scraper
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9093
    consumer:
      group-id: scraper-workers
      auto-offset-reset: earliest
      enable-auto-commit: false

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        scraper.jobs.duration: true
      percentiles:
        scraper.jobs.duration: 0.5, 0.95, 0.99